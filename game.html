<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title id="pageTitle">GameVault — تحميل اللعبة</title>
  <meta name="description" id="metaDesc" content="العب مجاناً على GameVault"/>
  <meta name="keywords" id="metaKeywords" content="العاب, gamevault"/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" id="canonical" href=""/>

  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="GameVault"/>
  <meta property="og:title" id="ogTitle" content="GameVault"/>
  <meta property="og:description" id="ogDesc" content=""/>
  <meta property="og:image" id="ogImage" content=""/>
  <meta property="og:url" id="ogUrl" content=""/>

  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" id="twTitle" content="GameVault"/>
  <meta name="twitter:description" id="twDesc" content=""/>
  <meta name="twitter:image" id="twImage" content=""/>

  <script type="application/ld+json" id="schemaScript">{}</script>

  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div id="loaderState">جاري التحميل...</div>
<div id="errorState" style="display:none">اللعبة غير موجودة</div>

<div id="gameContent" style="display:none">

  <iframe id="gameFrame" style="width:100%;height:500px;border:0"></iframe>

  <h1 id="gameTitle"></h1>
  <p id="gameDesc"></p>

</div>

<script src="app.js"></script>

<script>
let gameData = null;

window.addEventListener('DOMContentLoaded', async () => {

  const params = new URLSearchParams(window.location.search);

  const id = params.get('id');
  const slug = params.get('slug');

  if (!id && !slug) {
    showError();
    return;
  }

  await loadGamePage(id, slug);
});


async function loadGamePage(id, slug) {
  try {

    let query = sb.from('games').select('*');

    if (id) {
      query = query.eq('id', id);
    } else {
      query = query.eq('slug', slug);
    }

    const { data: g, error } = await query.single();

    if (error || !g) {
      showError();
      return;
    }

    gameData = g;

    renderGame(g);
    injectSEO(g);

    document.getElementById('gameFrame').src = g.game_url;

    document.getElementById('loaderState').style.display = 'none';
    document.getElementById('gameContent').style.display = 'block';

  } catch (e) {
    console.error(e);
    showError();
  }
}


function renderGame(g) {
  document.getElementById('gameTitle').textContent = g.title;
  document.getElementById('gameDesc').textContent = g.description;
}


function injectSEO(g) {

  const url = window.location.href;

  document.title = g.title + " | GameVault";

  document.getElementById('metaDesc').content = g.description || "";
  document.getElementById('canonical').href = url;

  document.getElementById('ogTitle').content = g.title;
  document.getElementById('ogDesc').content = g.description || "";
  document.getElementById('ogUrl').content = url;

  document.getElementById('twTitle').content = g.title;

  const schema = {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": g.title,
    "description": g.description,
    "url": url,
    "image": g.thumbnail_url || "",
    "genre": g.category
  };

  document.getElementById('schemaScript').textContent =
    JSON.stringify(schema, null, 2);
}


function showError() {
  document.getElementById('loaderState').style.display = 'none';
  document.getElementById('errorState').style.display = 'block';
}

</script>

</body>
</html>
