<script src="app.js"></script>
<script>

window.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  const id   = params.get('id');
  let slug = params.get('slug');

  // إذا لم يوجد slug في query string، اقرأه من الـ path
  if (!slug) {
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    if (pathParts.length === 1) slug = pathParts[0];
  }

  if (!id && !slug) { showError(); return; }

  await checkSession();
  await loadGamePage(id, slug);
});

async function loadGamePage(id, slug) {
  try {
    let query = sb.from('games').select('*');
    query = id ? query.eq('id', id) : query.eq('slug', slug);

    const { data, error } = await query.limit(1);

    if (error || !data || data.length === 0) { showError(); return; }

    const g = data[0];
    currentGame = g; // متغيّر عام من app.js — تستفيد منه toggleLike / shareGame / reloadFrame / openGameNewTab

    await renderGame(g);
    injectSEO(g);

    document.getElementById('loaderState').classList.add('hidden');
    document.getElementById('gameContent').classList.remove('hidden');

  } catch (e) {
    console.error(e);
    showError();
  }
}

async function renderGame(g) {
  document.getElementById('topbarTitle').textContent = g.title;
  document.getElementById('gameTitle').textContent   = g.title;
  document.getElementById('gameDesc').textContent    = g.description || '';
  document.getElementById('gmEngine').textContent    = g.engine || '';
  document.getElementById('gmCategory').textContent  = g.category || '';
  document.getElementById('gmTags').innerHTML = (g.tags || []).map(t => `<span class="tag">${escHtml(t)}</span>`).join('');
  document.getElementById('likeCount').textContent   = g.likes_count || 0;

  // معلومات الناشر
  if (g.uploader_id) {
    const { data: prof } = await sb.from('profiles').select('username').eq('id', g.uploader_id).single();
    document.getElementById('gmUploader').textContent = prof?.username || 'مجهول';
  } else {
    document.getElementById('gmUploader').textContent = 'مجهول';
  }

  // حالة الإعجاب
  const liked = likedGames.has(g.id);
  document.getElementById('likeIcon').textContent = liked ? '❤️' : '🤍';
  document.getElementById('likeBtn').className = 'action-btn like-btn' + (liked ? ' liked' : '');

  // تحميل اللعبة في iframe
  const frame = document.getElementById('gameFrame');
  await loadGameInFrame(frame, g.game_url || '');
}

// مثل toggleLike في app.js لكن يوجّه الزائر غير المسجّل لتسجيل الدخول من الصفحة الرئيسية
function handleLikeClick() {
  if (!currentUser) {
    showToast('سجّل الدخول لإضافة اللعبة للمفضلة');
    setTimeout(() => { window.location.href = 'index.html'; }, 1200);
    return;
  }
  toggleLike();
}

// ===== وضع الشاشة الكاملة لصفحة اللعبة المستقلة =====
let isStandaloneFullscreen = false;
function toggleStandaloneView() {
  const card  = document.getElementById('gamePageCard');
  const icon  = document.getElementById('viewToggleIcon');
  const label = document.getElementById('viewToggleLabel');
  if (!card) return;

  isStandaloneFullscreen = !isStandaloneFullscreen;

  if (isStandaloneFullscreen) {
    card.classList.add('game-modal-fullscreen');
    icon.textContent  = '⊡';
    label.textContent = 'نافذة مصغرة';
    showToast('وضع الشاشة الكاملة — اضغط مجدداً للخروج');
  } else {
    card.classList.remove('game-modal-fullscreen');
    icon.textContent  = '⛶';
    label.textContent = 'شاشة كاملة';
    showToast('وضع النافذة');
  }
}

// ===== SEO =====
function injectSEO(g) {
  const url = window.location.href;
  const title = `${g.title} — العب مجاناً | VILO.LY`;

  document.title = title;
  document.getElementById('pageTitle').textContent = title;

  const desc = g.meta_description || g.description || '';
  document.getElementById('metaDesc').content = desc;

  const tagsList = (g.tags || []).join(', ');
  document.getElementById('metaKeywords').content = [tagsList, g.title, 'العاب', 'VILO.LY'].filter(Boolean).join(', ');

  document.getElementById('canonical').href = url;

  document.getElementById('ogTitle').content = g.title;
  document.getElementById('ogDesc').content  = desc;
  document.getElementById('ogUrl').content   = url;
  if (g.thumbnail_url) document.getElementById('ogImage').content = g.thumbnail_url;

  document.getElementById('twTitle').content = g.title;
  document.getElementById('twDesc').content  = desc;
  if (g.thumbnail_url) document.getElementById('twImage').content = g.thumbnail_url;

  const schema = {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": g.title,
    "description": g.description,
    "url": url,
    "image": g.thumbnail_url || "",
    "genre": g.category,
    "applicationCategory": "Game",
    "operatingSystem": "Any"
  };

  document.getElementById('schemaScript').textContent = JSON.stringify(schema, null, 2);
}

function showError() {
  document.getElementById('loaderState').classList.add('hidden');
  document.getElementById('errorState').classList.remove('hidden');
}

</script>
